org: myself44

service: nf-processor

frameworkVersion: "4"

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'local'}

  environment:
    STAGE: ${self:provider.stage}

plugins:
  - serverless-localstack 
  - serverless-offline

custom:
  localstack:
    stages:
      - local
    host: http://localhost 
    edgePort: 4566

  serverless-offline:
    httpPort: 3000

functions:
  health:
    handler: src/handlers/health.handler
    events: 
      - httpApi:
          path: /health
          method: get
  post:
    handler: src/handlers/post.handler
    events:
      - httpApi:
          path: /post
          method: post
